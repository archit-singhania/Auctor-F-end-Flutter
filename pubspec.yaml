name: auctor_app
description: Auctor – The Developer Trust Score
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP client
  http: ^1.2.1
  http_parser: ^4.0.2

  # File Picking
  file_picker: ^8.0.3

  # Animations (no network fonts needed)
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3

  # REMOVED: google_fonts — was causing network errors on emulator.
  # We use system fonts (Inter on Android, SF Pro on iOS) which look identical.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/
